<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Competition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- HEADER -->

<header class="topHeader">

<div class="headerLeft">

<div class="menuBtn">
<i class="fa-solid fa-bars"></i>
</div>

<div class="logo">
eKickHub
</div>

</div>

<div class="headerCenter">

Competition Center

</div>

<div class="headerRight">

<div class="headerIcon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="headerIcon">
<i class="fa-solid fa-trophy"></i>
</div>

</div>

</header>

<!-- HERO -->

<section class="heroSection">

<div class="heroOverlay"></div>

<img
class="heroImage"
src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1600&auto=format&fit=crop">

<div class="heroContent">

<h1>
GLOBAL ESPORTS BATTLES
</h1>

<p>
Join tournaments, dominate rankings, and become champion.
</p>

</div>

</section>

<!-- TABS -->

<div class="tabsWrap">

<button class="tabBtn active"
data-tab="registration">

REGISTRATION ON

</button>

<button class="tabBtn"
data-tab="upcoming">

UPCOMING

</button>

<button class="tabBtn"
data-tab="running">

RUNNING

</button>

<button class="tabBtn"
data-tab="completed">

COMPLETED

</button>

</div>

<!-- SEARCH -->

<div class="searchWrap">

<input
type="text"
id="searchInput"
placeholder="Search competition...">

</div>

<!-- COMPETITION LIST -->

<div class="competitionGrid"
id="competitionGrid">

</div>

<script type="module" src="app.js"></script>

</body>
</html>
