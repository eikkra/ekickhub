<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Competition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- HEADER -->

<header class="topHeader">

<div class="headerLeft">

<div class="menuBtn">
<i class="fa-solid fa-bars"></i>
</div>

<div class="logo">
eKickHub
</div>

</div>

<div class="headerCenter">

Competition Center

</div>

<div class="headerRight">

<div class="headerIcon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="headerIcon">
<i class="fa-solid fa-trophy"></i>
</div>

</div>

</header>

<!-- HERO -->

<section class="heroSection">

<div class="heroOverlay"></div>

<img
class="heroImage"
src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1600&auto=format&fit=crop">

<div class="heroContent">

<h1>
GLOBAL ESPORTS BATTLES
</h1>

<p>
Join tournaments, dominate rankings, and become champion.
</p>

</div>

</section>

<!-- TABS -->

<div class="tabsWrap">

<button class="tabBtn active"
data-tab="registration">

REGISTRATION ON

</button>

<button class="tabBtn"
data-tab="upcoming">

UPCOMING

</button>

<button class="tabBtn"
data-tab="running">

RUNNING

</button>

<button class="tabBtn"
data-tab="completed">

COMPLETED

</button>

</div>

<!-- SEARCH -->

<div class="searchWrap">

<input
type="text"
id="searchInput"
placeholder="Search competition...">

</div>

<!-- COMPETITION LIST -->

<div class="competitionGrid"
id="competitionGrid">

</div>

<script type="module" src="app.js"></script>

<!-- CREATE BUTTON -->

<button class="floatingCreateBtn"
id="openCreateModal">

<i class="fa-solid fa-plus"></i>

</button>

<!-- CREATE MODAL -->

<div class="createModal"
id="createModal">

<div class="createBox">

<div class="createHeader">

<h2>Create Competition</h2>

<div id="closeCreateModal">
<i class="fa-solid fa-xmark"></i>
</div>

</div>

<input
type="text"
id="comp_title"
placeholder="Competition Title">

<input
type="text"
id="comp_image"
placeholder="Competition Image URL">

<select id="comp_format">

<option value="">
Select Format
</option>

<option>
32 PLAYER GROUP STAGE
</option>

<option>
64 PLAYER LEAGUE
</option>

<option>
128 PLAYER KNOCKOUT
</option>

<option>
CO-OP TOURNAMENT
</option>

</select>

<select id="comp_slots">

<option value="">
Select Slots
</option>

<option>32</option>
<option>64</option>
<option>128</option>
<option>256</option>
<option>512</option>

</select>

<input
type="text"
id="comp_prize"
placeholder="Prize Pool">

<select id="comp_status">

<option value="registration">
REGISTRATION
</option>

<option value="upcoming">
UPCOMING
</option>

<option value="running">
RUNNING
</option>

<option value="completed">
COMPLETED
</option>

</select>

<label class="dateLabel">

Registration Date

</label>

<input
type="datetime-local"
id="comp_date">

<button id="publishCompetition">

PUBLISH COMPETITION

</button>

</div>

</div>

</body>
</html>
