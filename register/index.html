<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GOAT FC Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:
radial-gradient(circle at top,#0f172a,#020617);

min-height:100vh;

padding:30px 15px;

overflow-y:auto;

color:white;

display:flex;

justify-content:center;

align-items:center;

}


/* RGB BACKGROUND */
body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#00ffe1;
filter:blur(180px);
opacity:.15;
top:-100px;
left:-100px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#ff00c8;
filter:blur(180px);
opacity:.15;
bottom:-100px;
right:-100px;
z-index:-1;
}


.container{

width:100%;
max-width:520px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.08);

border-radius:24px;

padding:30px 25px;

box-shadow:
0 0 30px rgba(0,255,225,.15);

}


.logo{

font-size:38px;

font-weight:900;

text-align:center;

margin-bottom:5px;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;

font-size:12px;

color:#aaa;

margin-bottom:25px;

}


.inputBox{
margin-bottom:16px;
}

input,
select{

width:100%;

padding:15px;

border:none;

outline:none;

border-radius:14px;

background:#0f172a;

color:white;

font-size:14px;

border:1px solid #1e293b;

transition:.3s;

}

input:focus,
select:focus{

border-color:#00ffe1;

box-shadow:
0 0 15px rgba(0,255,225,.4);

}


.fileLabel{

display:block;

padding:15px;

border-radius:14px;

background:#0f172a;

border:1px dashed #334155;

cursor:pointer;

text-align:center;

font-size:13px;

color:#aaa;

}


#image{
display:none;
}


.preview{

width:110px;

height:110px;

border-radius:50%;

object-fit:cover;

margin:20px auto;

display:none;

border:3px solid #00ffe1;

box-shadow:
0 0 20px rgba(0,255,225,.5);

}


button{

width:100%;

padding:16px;

border:none;

border-radius:14px;

font-size:15px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

color:white;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 20px rgba(0,255,225,.4);

}


.msg{

margin-top:18px;

text-align:center;

font-size:13px;

font-weight:700;

}


@media(max-width:600px){

.container{
padding:25px 18px;
}

.logo{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
GOAT FC
</div>

<div class="sub">
Scorer Football Gaming Community
</div>


<div class="inputBox">
<input type="text"
id="name"
placeholder="Full Name">
</div>


<div class="inputBox">
<input type="email"
id="email"
placeholder="Email Address">
</div>


<div class="inputBox">
<input type="password"
id="password"
placeholder="Password">
</div>


<div class="inputBox">

<select id="position">

<option value="">
Select Position
</option>

<option>CF</option>
<option>SS</option>
<option>LWF</option>
<option>RWF</option>
<option>AMF</option>
<option>LMF</option>
<option>RMF</option>
<option>CMF</option>
<option>DMF</option>
<option>LB</option>
<option>RB</option>
<option>CB</option>
<option>GK</option>

</select>

</div>


<div class="inputBox">
<input type="text"
id="phone"
placeholder="Phone Number">
</div>


<div class="inputBox">

<select id="district">

<option value="">
Select District
</option>

<option>Dhaka</option>
<option>Chattogram</option>
<option>Sylhet</option>
<option>Khulna</option>
<option>Rajshahi</option>
<option>Barishal</option>
<option>Rangpur</option>
<option>Mymensingh</option>

</select>

</div>


<label class="fileLabel">

Upload Profile Image

<input type="file"
id="image"
accept="image/*">

</label>


<img id="preview"
class="preview">


<button onclick="register()">
REGISTER NOW
</button>


<div class="msg" id="msg">
</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
