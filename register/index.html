<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>eFootHub Register</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#020617;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow-y:auto;

color:white;

}

body::before{
content:'';
position:fixed;
width:400px;
height:400px;
background:#00ffe1;
filter:blur(170px);
opacity:.15;
top:-100px;
left:-100px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:400px;
height:400px;
background:#ff00c8;
filter:blur(170px);
opacity:.15;
bottom:-100px;
right:-100px;
z-index:-1;
}

.box{

width:100%;
max-width:430px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:24px;

border-radius:24px;

box-shadow:
0 0 25px rgba(0,255,225,.12);

}

.logo{

font-size:34px;

font-weight:900;

text-align:center;

margin-bottom:6px;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;

font-size:11px;

color:#aaa;

margin-bottom:22px;

}

.inputBox{
position:relative;
margin-bottom:12px;
}

input,
select{

width:100%;

padding:13px 14px;

background:#0f172a;

border:1px solid #1e293b;

border-radius:12px;

color:white;

font-size:13px;

outline:none;

transition:.3s;

}

input:focus,
select:focus{

border-color:#00ffe1;

box-shadow:
0 0 12px rgba(0,255,225,.3);

}

.eye{

position:absolute;

right:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:14px;

color:#aaa;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

font-size:14px;

font-weight:700;

color:white;

cursor:pointer;

margin-top:8px;

}

.preview{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

display:none;

margin:10px auto;

border:3px solid #00ffe1;

}

.msg{

margin-top:15px;

text-align:center;

font-size:12px;

font-weight:700;

}

.bottom{

margin-top:18px;

text-align:center;

font-size:12px;

color:#aaa;

}

.bottom a{
color:#00ffe1;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">
eFootHub
</div>

<div class="sub">
Scorer Football Gaming Community
</div>

<div class="inputBox">
<input type="text"
id="full_name"
placeholder="Full Name">
</div>

<div class="inputBox">
<input type="email"
id="email"
placeholder="Email Address">
</div>

<div class="inputBox">

<input type="password"
id="password"
placeholder="Password">

<span class="eye"
onclick="togglePass()">
👁
</span>

</div>

<div class="inputBox">
<input type="text"
id="phone"
placeholder="Phone Number">
</div>

<div class="inputBox">

<select id="district">

<option value="">
Select District
</option>

<option>Dhaka</option>
<option>Chattogram</option>
<option>Sylhet</option>
<option>Khulna</option>
<option>Rajshahi</option>
<option>Barishal</option>
<option>Rangpur</option>
<option>Mymensingh</option>

</select>

</div>

<div class="inputBox">

<select id="position">

<option value="">
Select Position
</option>

<option>CF</option>
<option>SS</option>
<option>LWF</option>
<option>RWF</option>
<option>AMF</option>
<option>LMF</option>
<option>RMF</option>
<option>CMF</option>
<option>DMF</option>
<option>LB</option>
<option>RB</option>
<option>CB</option>
<option>GK</option>

</select>

</div>

<div class="inputBox">
<input type="text"
id="konami_id"
placeholder="ASDS-005-998-145">
</div>

<div class="inputBox">
<input type="text"
id="device_name"
placeholder="Device Name">
</div>

<div class="inputBox">
<input type="text"
id="fb_id_url"
placeholder="Facebook Profile URL">
</div>

<div class="inputBox">
<input type="file"
id="image"
accept="image/*">
</div>

<img id="preview"
class="preview">

<button onclick="register()">
REGISTER NOW
</button>

<div class="msg"
id="msg">
</div>

<div class="bottom">

Already have account?

<a href="../login/">
Login Here
</a>

</div>

</div>

<script>

function togglePass(){

const pass =
document.getElementById("password");

if(pass.type==="password"){

pass.type="text";

}else{

pass.type="password";

}

}

</script>

<script type="module" src="app.js"></script>

</body>
</html>
