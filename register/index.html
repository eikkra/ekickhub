<!DOCTYPE html>
<html>
<head>
<title>GOAT FC Registration</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2a2a);
  color:white;
}

.box{
  width:400px;
  margin:40px auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 20px #00ffcc55;
}

h2{
  text-align:center;
  color:#00ffcc;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#00ffcc;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00c9a3;
}
</style>
</head>

<body>

<div class="box">

<h2>Player Registration</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<!-- POSITION DROPDOWN -->
<select id="position">
  <option>Choose Position</option>
  <option>CF</option>
  <option>SS</option>
  <option>LWF</option>
  <option>RWF</option>
  <option>AMF</option>
  <option>LMF</option>
  <option>RMF</option>
  <option>CMF</option>
  <option>DMF</option>
  <option>CB</option>
  <option>LB</option>
  <option>RB</option>
  <option>GK</option>
</select>

<input id="phone" placeholder="Phone Number">
<input id="district" placeholder="District">

<input type="file" id="image">

<button onclick="register()">REGISTER</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
