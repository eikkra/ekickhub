<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#020617;
min-height:100vh;
padding:20px;

display:flex;
justify-content:center;
align-items:center;

overflow-y:auto;
color:white;

}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#00ffe1;
filter:blur(180px);
opacity:.15;
top:-100px;
left:-100px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#ff00c8;
filter:blur(180px);
opacity:.15;
bottom:-100px;
right:-100px;
z-index:-1;
}

.box{

width:100%;
max-width:520px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

padding:28px;

border-radius:24px;

box-shadow:
0 0 30px rgba(0,255,225,.15);

}

.logo{

text-align:center;
font-size:38px;
font-weight:900;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

.sub{
text-align:center;
font-size:12px;
color:#aaa;
margin-bottom:24px;
}

input,
select{

width:100%;

padding:15px;

margin-bottom:15px;

background:#0f172a;

border:1px solid #1e293b;

border-radius:14px;

color:white;

outline:none;

}

input:focus,
select:focus{

border-color:#00ffe1;

box-shadow:
0 0 15px rgba(0,255,225,.4);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

font-size:15px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

color:white;

}

.preview{

width:110px;
height:110px;

border-radius:50%;

object-fit:cover;

display:none;

margin:10px auto;

border:3px solid #00ffe1;

}

.msg{

text-align:center;
margin-top:15px;
font-size:13px;
font-weight:700;

}

.bottom{

text-align:center;
margin-top:20px;
font-size:13px;

}

.bottom a{
color:#00ffe1;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">
eFootHub
</div>

<div class="sub">
Scorer Football Gaming Community
</div>

<input type="text" id="full_name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<input type="text" id="phone" placeholder="Phone Number">

<select id="district">

<option value="">
Select District
</option>

<option>Dhaka</option>
<option>Chattogram</option>
<option>Sylhet</option>
<option>Khulna</option>
<option>Rajshahi</option>
<option>Barishal</option>
<option>Rangpur</option>
<option>Mymensingh</option>

</select>

<select id="position">

<option value="">
Select Position
</option>

<option>CF</option>
<option>SS</option>
<option>LWF</option>
<option>RWF</option>
<option>AMF</option>
<option>LMF</option>
<option>RMF</option>
<option>CMF</option>
<option>DMF</option>
<option>LB</option>
<option>RB</option>
<option>CB</option>
<option>GK</option>

</select>

<input type="text"
id="konami_id"
placeholder="Konami ID (ASDS-005-998-145)">

<input type="text"
id="device_name"
placeholder="Device Name">

<input type="text"
id="fb_id_url"
placeholder="Facebook Profile URL">

<input type="file"
id="image"
accept="image/*">

<img id="preview"
class="preview">

<button onclick="register()">
REGISTER NOW
</button>

<div class="msg" id="msg"></div>

<div class="bottom">
Already have account?
<a href="../login/">
Login Here
</a>
</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
