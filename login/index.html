<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eFootHub Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:350px;
  background:#111;
  padding:30px;
  border-radius:15px;
  border:1px solid #00ffcc44;
  box-shadow:0 0 20px #00ffcc22;
}

h1{
  text-align:center;
  color:#00ffcc;
  margin-bottom:25px;
}

input, select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#1c1c1c;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

#message{
  margin-top:15px;
  text-align:center;
  color:#00ffcc;
}

</style>
</head>
<body>

<div class="container">

<h1>eFootHub</h1>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<select id="role">

<option value="player">Player</option>

<option value="club">Club Manager</option>

</select>

<button onclick="register()">
Register
</button>

<br><br>

<button onclick="login()">
Login
</button>

<div id="message"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyCDQw62DQSFFUUSk8l6dOqu2PDo9gYxq6U",
  authDomain: "eikkra.firebaseapp.com",
  projectId: "eikkra",
  storageBucket: "eikkra.firebasestorage.app",
  messagingSenderId: "969860834089",
  appId: "1:969860834089:web:9b622da21ebced673e0d38",
  measurementId: "G-LSG3R7V6YK"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



window.register = async function(){

const name = document.getElementById("name").value;

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

const role = document.getElementById("role").value;

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;


await setDoc(doc(db, "users", user.uid), {

name:name,
email:email,
role:role,
coins:0,
createdAt:new Date()

});


document.getElementById("message").innerHTML =
"🔥 Registration Successful!";

}
catch(error){

document.getElementById("message").innerHTML =
error.message;

}

}



window.login = async function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

try{

const userCredential =
await signInWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;


const userDoc =
await getDoc(doc(db,"users",user.uid));

const userData = userDoc.data();


document.getElementById("message").innerHTML =
"🔥 Login Successful!";


console.log(userData);


if(userData.role === "player"){

window.location.href =
"/player/player.html";

}


if(userData.role === "club"){

window.location.href =
"/club/club.html";

}

}
catch(error){

document.getElementById("message").innerHTML =
error.message;

}

}

</script>

</body>
</html>
