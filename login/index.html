<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>eKickHub Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#020617;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

color:white;

}

.bg1{

position:fixed;
width:400px;
height:400px;
background:#00ffe1;
filter:blur(180px);
opacity:.15;
top:-100px;
left:-100px;
z-index:-1;

}

.bg2{

position:fixed;
width:400px;
height:400px;
background:#ff00c8;
filter:blur(180px);
opacity:.15;
bottom:-100px;
right:-100px;
z-index:-1;

}

.box{

width:100%;
max-width:420px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(16px);

padding:30px;

border-radius:30px;

box-shadow:
0 0 35px rgba(0,255,225,.18);

position:relative;

z-index:10;

}

.logo{

font-size:42px;
font-weight:900;

text-align:center;

margin-bottom:8px;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.sub{

text-align:center;

font-size:11px;

color:#aaa;

margin-bottom:25px;

}

.inputBox{

margin-bottom:15px;

position:relative;

}

.inputBox input{

width:100%;

padding:14px;

background:#0f172a;

border:
1px solid #1e293b;

border-radius:15px;

outline:none;

color:white;

font-size:13px;

}

.eye{

position:absolute;

right:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:16px;

z-index:999;

}

.btn{

width:100%;

padding:14px;

border:none;

border-radius:15px;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

font-size:14px;

font-weight:700;

cursor:pointer;

color:white;

margin-top:5px;

}

.googleBtn{

width:100%;

padding:14px;

border:none;

border-radius:15px;

background:white;

font-size:13px;

font-weight:700;

cursor:pointer;

margin-top:15px;

}

.msg{

margin-top:15px;

text-align:center;

font-size:12px;

font-weight:700;

color:#00ffe1;

min-height:20px;

}

.bottom{

margin-top:20px;

text-align:center;

font-size:12px;

color:#aaa;

}

.bottom a{

color:#00ffe1;

text-decoration:none;

cursor:pointer;

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="box">

<div class="logo">
eKickHub
</div>

<div class="sub">
Elite Football Gaming Platform
</div>

<div class="inputBox">

<input
type="email"
id="email"
placeholder="Email Address">

</div>

<div class="inputBox">

<input
type="password"
id="password"
placeholder="Password">

<span
class="eye"
id="eyeBtn">

👁

</span>

</div>

<button
class="btn"
id="loginBtn">

LOGIN

</button>

<button
class="googleBtn"
id="googleBtn">

CONTINUE WITH GOOGLE

</button>

<div
class="msg"
id="msg">
</div>

<div class="bottom">

<a id="forgotBtn">

Forgot Password?

</a>

<br><br>

No account?

<a href="../register/">

Register Now

</a>

</div>

</div>

<script type="module"
src="app.js"></script>

</body>
</html>
