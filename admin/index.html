<!-- admin/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eKickHub Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

.bg1,.bg2{
position:fixed;
width:350px;
height:350px;
filter:blur(170px);
opacity:.12;
z-index:-1;
}

.bg1{
background:#00ffe1;
top:-100px;
left:-100px;
}

.bg2{
background:#ff00c8;
bottom:-100px;
right:-100px;
}

.topbar{
height:60px;
padding:0 16px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,.03);
border-bottom:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(12px);
position:sticky;
top:0;
z-index:999;
}

.leftTop{
display:flex;
align-items:center;
gap:14px;
}

.menuBtn{
font-size:20px;
cursor:pointer;
color:#00ffe1;
}

.logo{
font-size:18px;
font-weight:900;
background:linear-gradient(90deg,#00ffe1,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.rightTop{
display:flex;
align-items:center;
gap:16px;
}

.topIcon{
font-size:17px;
cursor:pointer;
color:#cbd5e1;
}

.sidebar{
position:fixed;
left:-270px;
top:0;
width:260px;
height:100vh;
background:#081120;
border-right:1px solid rgba(255,255,255,.08);
transition:.3s;
padding:18px;
z-index:9999;
overflow-y:auto;
}

.sidebar.active{
left:0;
}

.sideTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:28px;
}

.closeBtn{
font-size:22px;
cursor:pointer;
color:#ff4d6d;
}

.adminBox{
display:flex;
align-items:center;
gap:12px;
margin-bottom:28px;
}

.adminBox img{
width:55px;
height:55px;
border-radius:14px;
object-fit:cover;
border:2px solid #00ffe1;
}

.adminName{
font-size:14px;
font-weight:700;
}

.adminRole{
font-size:10px;
color:#94a3b8;
margin-top:4px;
}

.roleSwitchBox{
margin-bottom:20px;
}

.roleTitle{
font-size:11px;
color:#94a3b8;
margin-bottom:10px;
}

.roleSwitchBtn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
font-size:11px;
font-weight:700;
color:white;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
transition:.2s;
}

.roleSwitchBtn:hover{
background:linear-gradient(90deg,#00ffe120,#ff00c820);
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:14px;
text-decoration:none;
color:#e2e8f0;
font-size:12px;
background:rgba(255,255,255,.03);
}

.menu a:hover{
background:linear-gradient(90deg,#00ffe120,#ff00c820);
}

.logoutBtn{
background:#ff174420!important;
color:#ff4d6d!important;
margin-top:15px;
}

.main{
padding:18px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:18px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
padding:18px;
border-radius:20px;
}

.cardTitle{
font-size:11px;
color:#94a3b8;
margin-bottom:8px;
}

.cardValue{
font-size:24px;
font-weight:900;
}

.section{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
border-radius:22px;
padding:18px;
margin-bottom:20px;
}

.sectionTitle{
font-size:14px;
font-weight:700;
margin-bottom:15px;
}

.searchBox{
margin-bottom:18px;
}

.searchBox input{
width:100%;
padding:14px;
background:#0f172a;
border:none;
outline:none;
border-radius:16px;
color:white;
}

.tableWrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th,td{
padding:14px;
text-align:left;
font-size:11px;
border-bottom:1px solid rgba(255,255,255,.05);
}

th{
color:#94a3b8;
}

.userFlex{
display:flex;
align-items:center;
gap:10px;
}

.userFlex img{
width:45px;
height:45px;
border-radius:12px;
object-fit:cover;
}

.playerName{
font-size:12px;
font-weight:700;
}

.playerEmail{
font-size:10px;
color:#94a3b8;
margin-top:4px;
}

.roleWrap{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.roleChip{
padding:7px 10px;
border-radius:50px;
font-size:10px;
font-weight:700;
display:flex;
align-items:center;
gap:6px;
}

.playerRole{
background:#00ffe120;
color:#00ffe1;
}

.adminRoleChip{
background:#ff00c820;
color:#ff4dff;
}

.modRole{
background:#f59e0b20;
color:#fbbf24;
}

.managerRole{
background:#3b82f620;
color:#60a5fa;
}

.refRole{
background:#10b98120;
color:#34d399;
}

.roleChip i{
cursor:pointer;
}

.actionBtns{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.actionBtns button{
border:none;
cursor:pointer;
padding:9px 12px;
border-radius:10px;
font-size:10px;
font-weight:700;
color:white;
}

.approveBtn{
background:#00c853;
}

.rejectBtn{
background:#ff1744;
}

.roleBtn{
background:#7c3aed;
}

.editBtn{
background:#0284c7;
}

.banBtn{
background:#dc2626;
}

.unbanBtn{
background:#16a34a;
}

.deleteBtn{
background:#991b1b;
}

.banned{
color:#ff4d6d;
font-weight:700;
}

.approved{
color:#00e676;
font-weight:700;
}

.pending{
color:#fbbf24;
font-weight:700;
}

@media(max-width:900px){

.cards{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="topbar">

<div class="leftTop">

<i class="fa-solid fa-bars menuBtn"
id="menuBtn"></i>

<div class="logo">
eKickHub Admin
</div>

</div>

<div class="rightTop">

<i class="fa-regular fa-bell topIcon"></i>

<i class="fa-regular fa-envelope topIcon"></i>

</div>

</div>

<div class="sidebar"
id="sidebar">

<div class="sideTop">

<div class="logo">
eKickHub
</div>

<i class="fa-solid fa-xmark closeBtn"
id="closeBtn"></i>

</div>

<div class="adminBox">

<img id="adminImage"
src="">

<div>

<div class="adminName"
id="adminName">
Admin
</div>

<div class="adminRole">
SUPER ADMIN
</div>

</div>

</div>

<!-- ROLE SWITCH -->

<div class="roleSwitchBox">

<div class="roleTitle">
SWITCH ROLE
</div>

<div id="roleSwitchList"></div>

</div>

<div class="menu">

<a href="#">
<i class="fa-solid fa-house"></i>
Dashboard
</a>

<a href="#">
<i class="fa-solid fa-user-check"></i>
Player Approval
</a>

<a href="#">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="#">
<i class="fa-solid fa-shield-halved"></i>
Roles
</a>

<a href="#">
<i class="fa-solid fa-trophy"></i>
Competition
</a>

<a href="#">
<i class="fa-solid fa-ranking-star"></i>
Leaderboard
</a>

<a href="#">
<i class="fa-solid fa-gear"></i>
Settings
</a>

<a href="#"
class="logoutBtn"
id="logoutBtn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<div class="cardTitle">TOTAL USERS</div>
<div class="cardValue" id="totalUsers">0</div>
</div>

<div class="card">
<div class="cardTitle">PENDING APPROVAL</div>
<div class="cardValue" id="pendingUsers">0</div>
</div>

<div class="card">
<div class="cardTitle">ADMINS</div>
<div class="cardValue" id="admins">0</div>
</div>

<div class="card">
<div class="cardTitle">BANNED USERS</div>
<div class="cardValue" id="bannedUsers">0</div>
</div>

</div>

<div class="section">

<div class="sectionTitle">
Player Approval Queue
</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>PLAYER</th>
<th>ID</th>
<th>COUNTRY</th>
<th>POSITION</th>
<th>ACTION</th>
</tr>

</thead>

<tbody id="approvalTable"></tbody>

</table>

</div>

</div>

<div class="section">

<div class="sectionTitle">
User Management
</div>

<div class="searchBox">

<input type="text"
id="searchInput"
placeholder="Search user / player ID / email">

</div>

<div class="tableWrap">

<table>

<thead>

<tr>
<th>PLAYER</th>
<th>PLAYER ID</th>
<th>ROLES</th>
<th>STATUS</th>
<th>ACTION</th>
</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<script type="module"
src="app.js"></script>

</body>
</html>
