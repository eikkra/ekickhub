<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eKickHub Admin Pro</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:'Orbitron';
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#0f172a;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100%;
background:#0b1220;
padding:20px;
overflow:auto;
}

.main{
margin-left:260px;
padding:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:12px;
}

.btn{
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:6px;
font-size:11px;
}

.approve{background:#22c55e;color:white;}
.reject{background:#ef4444;color:white;}
.role{background:#8b5cf6;color:white;}
.ban{background:#f59e0b;color:black;}
.delete{background:#dc2626;color:white;}
.edit{background:#3b82f6;color:white;}

.roleBox{
display:flex;
gap:5px;
flex-wrap:wrap;
}

.roleTag{
padding:3px 8px;
background:#1f2937;
border-radius:20px;
font-size:10px;
display:flex;
align-items:center;
gap:5px;
}

.roleTag i{
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">

<div>🔥 ADMIN PANEL</div>

<div>
<i class="fa fa-bell"></i>
<i class="fa fa-envelope"></i>
</div>

</div>

<div class="sidebar">

<h3>Menu</h3>

<p>Users</p>
<p>Roles</p>
<p>Ban System</p>
<p>Approval</p>

<button id="logoutBtn" class="btn delete">
Logout
</button>

</div>

<div class="main">

<div class="card">
<h3>User Management</h3>
<input id="search" placeholder="Search user..." style="width:100%;padding:10px">
</div>

<table>

<thead>
<tr>
<th>User</th>
<th>Email</th>
<th>Roles</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
