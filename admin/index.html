<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>eKickHub Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

body::-webkit-scrollbar{
width:0;
}

.bg1,
.bg2{
position:fixed;
width:420px;
height:420px;
border-radius:50%;
filter:blur(180px);
z-index:-1;
opacity:.18;
}

.bg1{
background:#00ffe1;
top:-120px;
left:-120px;
}

.bg2{
background:#ff00c8;
bottom:-120px;
right:-120px;
}

.sidebar{
position:fixed;
left:-270px;
top:0;
width:260px;
height:100vh;
background:#081120;
backdrop-filter:blur(16px);
border-right:1px solid rgba(255,255,255,.05);
padding:18px;
transition:.35s;
z-index:1000;
overflow-y:auto;
}

.sidebar.active{
left:0;
}

.closeBtn{
font-size:20px;
cursor:pointer;
margin-bottom:20px;
color:#ff00c8;
}

.sideLogo{
font-size:24px;
font-weight:800;
margin-bottom:25px;
background:linear-gradient(90deg,#00ffe1,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sideItem{
padding:14px;
border-radius:14px;
background:#0f172a;
margin-bottom:12px;
font-size:12px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,.05);
}

.sideItem:hover{
border-color:#00ffe1;
}

.topbar{
height:58px;
padding:0 14px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(15,23,42,.85);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.05);
position:sticky;
top:0;
z-index:999;
}

.leftTop{
display:flex;
align-items:center;
gap:14px;
}

.menuBtn{
font-size:18px;
cursor:pointer;
color:#00ffe1;
}

.logo{
font-size:20px;
font-weight:800;
background:linear-gradient(90deg,#00ffe1,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.rightTop{
display:flex;
align-items:center;
gap:14px;
}

.topIcon{
font-size:16px;
cursor:pointer;
color:#d1d5db;
}

.container{
width:100%;
max-width:1400px;
margin:auto;
padding:18px 14px 40px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.05);
border-radius:22px;
padding:20px;
backdrop-filter:blur(14px);
}

.cardTitle{
font-size:14px;
margin-bottom:16px;
color:#00ffe1;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.statBox{
background:#0f172a;
padding:18px;
border-radius:16px;
text-align:center;
}

.statNum{
font-size:22px;
font-weight:700;
color:#00ffe1;
}

.statLabel{
font-size:10px;
margin-top:8px;
color:#cbd5e1;
}

.userList{
display:flex;
flex-direction:column;
gap:14px;
}

.userCard{
background:#0f172a;
border-radius:18px;
padding:14px;
border:1px solid rgba(255,255,255,.04);
}

.userTop{
display:flex;
align-items:center;
gap:12px;
}

.userImage{
width:62px;
height:62px;
border-radius:16px;
object-fit:cover;
border:2px solid #00ffe1;
}

.userInfo{
flex:1;
}

.userName{
font-size:13px;
font-weight:700;
}

.userId{
font-size:10px;
margin-top:5px;
color:#94a3b8;
}

.userRole{
margin-top:8px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.roleTag{
padding:6px 10px;
border-radius:10px;
background:#111827;
font-size:9px;
border:1px solid rgba(255,255,255,.05);
}

.actionRow{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:14px;
}

.btn{
padding:11px 14px;
border:none;
border-radius:12px;
font-size:10px;
font-weight:700;
cursor:pointer;
color:white;
}

.approve{
background:linear-gradient(90deg,#00ff88,#00c853);
}

.reject{
background:linear-gradient(90deg,#ff1744,#d50000);
}

.edit{
background:linear-gradient(90deg,#00b0ff,#2962ff);
}

.switch{
background:linear-gradient(90deg,#ff00c8,#7c4dff);
}

.logout{
background:linear-gradient(90deg,#ff1744,#ff9100);
width:100%;
margin-top:10px;
}

.roleSelect{
width:100%;
padding:12px;
margin-top:12px;
border:none;
outline:none;
border-radius:12px;
background:#111827;
color:white;
font-size:11px;
}

.msg{
margin-top:14px;
font-size:11px;
color:#00ffe1;
text-align:center;
min-height:20px;
}

@media(min-width:768px){

.grid{
grid-template-columns:320px 1fr;
}

.stats{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="sidebar" id="sidebar">

<div class="closeBtn" id="closeBtn">
<i class="fa-solid fa-xmark"></i>
</div>

<div class="sideLogo">
eKickHub
</div>

<div class="sideItem">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</div>

<div class="sideItem">
<i class="fa-solid fa-user-check"></i>
Player Approval
</div>

<div class="sideItem">
<i class="fa-solid fa-users"></i>
All Users
</div>

<div class="sideItem" id="switchPlayer">
<i class="fa-solid fa-repeat"></i>
Switch To Player
</div>

<div class="sideItem" id="logoutBtn">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</div>

</div>

<div class="topbar">

<div class="leftTop">

<div class="menuBtn" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</div>

<div class="logo">
eKickHub Admin
</div>

</div>

<div class="rightTop">

<div class="topIcon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="topIcon">
<i class="fa-solid fa-envelope"></i>
</div>

<div class="topIcon">
<i class="fa-solid fa-user-shield"></i>
</div>

</div>

</div>

<div class="container">

<div class="grid">

<div class="card">

<div class="cardTitle">
SYSTEM STATUS
</div>

<div class="stats">

<div class="statBox">
<div class="statNum" id="totalUsers">0</div>
<div class="statLabel">TOTAL USERS</div>
</div>

<div class="statBox">
<div class="statNum" id="pendingUsers">0</div>
<div class="statLabel">PENDING</div>
</div>

<div class="statBox">
<div class="statNum" id="approvedUsers">0</div>
<div class="statLabel">APPROVED</div>
</div>

<div class="statBox">
<div class="statNum" id="admins">0</div>
<div class="statLabel">ADMINS</div>
</div>

</div>

<button class="btn logout" id="logoutBtn2">
Logout
</button>

<div class="msg" id="msg"></div>

</div>

<div class="card">

<div class="cardTitle">
PLAYER APPROVAL LIST
</div>

<div class="userList" id="approvalList"></div>

<br>

<div class="cardTitle">
ALL USERS & ROLE CONTROL
</div>

<div class="userList" id="userList"></div>

</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
