<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>eKickHub Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:#020617;
color:white;

padding:20px;

}

.top{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:25px;

}

.logo{

font-size:30px;
font-weight:900;

background:
linear-gradient(90deg,#00ffe1,#ff00c8);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.logout{

padding:10px 18px;

border:none;

border-radius:12px;

background:#ff004c;

color:white;

cursor:pointer;

font-weight:700;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:25px;

}

.card{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

}

.card h2{

font-size:14px;

color:#aaa;

margin-bottom:10px;

}

.card h1{

font-size:30px;

}

.sectionTitle{

font-size:18px;

margin-bottom:15px;

font-weight:700;

}

.users{

display:grid;
gap:15px;

}

.user{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.08);

padding:15px;

border-radius:20px;

display:flex;
gap:15px;
align-items:center;

flex-wrap:wrap;

}

.user img{

width:70px;
height:70px;

object-fit:cover;

border-radius:15px;

}

.info{

flex:1;

}

.info h3{

margin-bottom:6px;

font-size:15px;

}

.info p{

font-size:11px;

color:#aaa;

margin-bottom:4px;

}

.actions{

display:flex;
gap:10px;

flex-wrap:wrap;

}

.actions button{

padding:10px 14px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:11px;

font-weight:700;

color:white;

}

.approve{
background:#00c853;
}

.adminBtn{
background:#2962ff;
}

.reject{
background:#ff1744;
}

</style>

</head>

<body>

<div class="top">

<div class="logo">
eKickHub Admin
</div>

<button
class="logout"
id="logoutBtn">

Logout

</button>

</div>

<div class="grid">

<div class="card">

<h2>Total Users</h2>

<h1 id="totalUsers">
0
</h1>

</div>

<div class="card">

<h2>Pending Approval</h2>

<h1 id="pendingUsers">
0
</h1>

</div>

<div class="card">

<h2>Approved Users</h2>

<h1 id="approvedUsers">
0
</h1>

</div>

</div>

<div class="sectionTitle">
Pending Users
</div>

<div class="users"
id="usersContainer">
</div>

<script type="module"
src="app.js"></script>

</body>
</html>
